<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Mini Word Guess</title>
<style>
  :root{
    --bg:#0f1220;
    --panel:#171b2e;
    --panel2:#202646;
    --text:#f2f5ff;
    --muted:#9aa3c7;
    --grid:#30385f;
    --empty:#1a1f36;
    --correct:#3bb273;
    --present:#d9b44a;
    --absent:#4b567f;
    --accent:#7b8cff;
    --danger:#ff6b6b;
    --shadow: 0 12px 30px rgba(0,0,0,.35);
  }
  html,body{
    margin:0;
    width:100%;
    height:100%;
    background: radial-gradient(1200px 800px at 50% 20%, #1a2140 0%, var(--bg) 55%, #090b14 100%);
    color:var(--text);
    font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    overflow:hidden;
    touch-action: manipulation;
  }
  #game{
    display:block;
    width:100vw;
    height:100vh;
  }
  .ui{
    position:fixed;
    inset:0;
    pointer-events:none;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:space-between;
    padding:12px;
    box-sizing:border-box;
  }
  .topbar{
    width:min(720px, 96vw);
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    pointer-events:auto;
  }
  .title{
    font-weight:800;
    letter-spacing:.08em;
    text-transform:uppercase;
    font-size:14px;
    color:#dbe2ff;
    opacity:.95;
  }
  .stats{
    display:flex;
    gap:10px;
    align-items:center;
    font-size:13px;
    color:var(--muted);
  }
  .chip{
    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.08);
    border-radius:999px;
    padding:7px 10px;
    box-shadow: var(--shadow);
    user-select:none;
  }
  .centerPanel{
    width:min(720px, 96vw);
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:10px;
    pointer-events:none;
    margin-top:2vh;
  }
  .message{
    min-height:28px;
    padding:8px 14px;
    border-radius:12px;
    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.08);
    color:#eef2ff;
    font-size:14px;
    text-align:center;
    box-shadow: var(--shadow);
    backdrop-filter: blur(8px);
  }
  .boardWrap{
    display:flex;
    justify-content:center;
    align-items:center;
    pointer-events:none;
    flex:1;
    width:100%;
  }
  .board{
    display:grid;
    grid-template-rows:repeat(6, 1fr);
    gap:10px;
    padding:10px;
    border-radius:20px;
    background:rgba(255,255,255,.03);
    border:1px solid rgba(255,255,255,.06);
    box-shadow: var(--shadow);
  }
  .row{
    display:grid;
    grid-template-columns:repeat(5, 1fr);
    gap:10px;
  }
  .tile{
    width:clamp(48px, 9vw, 64px);
    height:clamp(48px, 9vw, 64px);
    border-radius:12px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:800;
    font-size:clamp(22px, 4vw, 30px);
    text-transform:uppercase;
    background:var(--empty);
    border:2px solid var(--grid);
    box-sizing:border-box;
    color:var(--text);
    user-select:none;
    transition:transform .08s ease, background .18s ease, border-color .18s ease;
  }
  .tile.filled{ border-color:#52608f; }
  .tile.pop{ transform:scale(1.06); }
  .tile.correct{ background:var(--correct); border-color:var(--correct); }
  .tile.present{ background:var(--present); border-color:var(--present); }
  .tile.absent{ background:var(--absent); border-color:var(--absent); }
  .tile.shake{ animation: shake .28s ease; }
  @keyframes shake{
    0%,100%{ transform:translateX(0); }
    20%{ transform:translateX(-6px); }
    40%{ transform:translateX(6px); }
    60%{ transform:translateX(-4px); }
    80%{ transform:translateX(4px); }
  }
  .keyboard{
    width:min(720px, 98vw);
    display:flex;
    flex-direction:column;
    gap:8px;
    pointer-events:auto;
    margin-bottom:6px;
  }
  .keyrow{
    display:flex;
    gap:6px;
    justify-content:center;
  }
  .key{
    min-width:clamp(26px, 7vw, 44px);
    height:clamp(44px, 7.5vw, 58px);
    padding:0 8px;
    border:none;
    border-radius:10px;
    background:#dfe4ff;
    color:#11172b;
    font-weight:800;
    font-size:clamp(12px, 2.7vw, 15px);
    cursor:pointer;
    box-shadow: 0 4px 10px rgba(0,0,0,.25);
    user-select:none;
  }
  .key.wide{ min-width:clamp(56px, 12vw, 82px); }
  .key:active{ transform:translateY(1px); }
  .key.correct{ background:var(--correct); color:white; }
  .key.present{ background:var(--present); color:#1b1400; }
  .key.absent{ background:var(--absent); color:white; }
  .footer{
    width:min(720px, 96vw);
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    pointer-events:none;
    color:var(--muted);
    font-size:12px;
    margin-bottom:8px;
  }
  .btn{
    pointer-events:auto;
    border:none;
    border-radius:10px;
    padding:10px 12px;
    background:rgba(255,255,255,.08);
    color:var(--text);
    cursor:pointer;
    font-weight:700;
  }
  .btn:hover{ background:rgba(255,255,255,.12); }
  .hidden{ display:none !important; }
  @media (max-width:520px){
    .stats{ display:none; }
    .topbar{ justify-content:center; }
    .footer{ flex-direction:column; align-items:center; text-align:center; }
  }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div class="ui">
  <div class="topbar">
    <div class="title">Word Guess 5</div>
    <div class="stats">
      <div class="chip" id="streakChip">Streak: 0</div>
      <div class="chip" id="seedChip">6 tries</div>
    </div>
    <button class="btn" id="restartBtn">Restart</button>
  </div>

  <div class="centerPanel">
    <div class="message" id="message">Guess the 5-letter word. Press Enter to submit.</div>
    <div class="boardWrap">
      <div class="board" id="board"></div>
    </div>
  </div>

  <div class="keyboard" id="keyboard"></div>

  <div class="footer">
    <div>Controls: Type letters · Backspace delete · Enter submit · Restart button / R key</div>
    <div id="resultText"></div>
  </div>
</div>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const boardEl = document.getElementById('board');
  const keyboardEl = document.getElementById('keyboard');
  const messageEl = document.getElementById('message');
  const resultText = document.getElementById('resultText');
  const streakChip = document.getElementById('streakChip');
  const restartBtn = document.getElementById('restartBtn');

  const WORDS = ["APPLE","BRAVE","CHARM","DREAM","EAGLE","FLAME","GRACE","HONEY","IRONY","JOKER","KNIFE","LIGHT","MIGHT","NOBLE","OCEAN","PRIDE","QUART","ROBIN","SHEEP","TIGER","UNION","VIVID","WATER","YEARN","ZEBRA","STONE","PLANT","CROWN","SHARE","MUSIC","GHOST","PLUMB","CIDER","BLAST","FRAME","TRAIL","SPARK","GLASS","BRINK","CLOAK","DAISY","FROST","GREEN","HUMAN","INDEX","LUNAR","METAL","NORTH","OPERA","PILOT","RIVER","SOLAR","THORN","ULTRA","VOTER","WOMAN","XENON","YOUTH","ZONED"];
  const answer = WORDS[Math.floor(Math.random() * WORDS.length)];
  let row = 0, col = 0, gameOver = false, streak = 0;
  const guesses = Array.from({length: 6}, () => Array(5).fill(''));
  const states = Array.from({length: 6}, () => Array(5).fill(''));
  const boardTiles = [];
  const keyButtons = new Map();

  function resize() {
    const dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
    canvas.width = Math.floor(innerWidth * dpr);
    canvas.height = Math.floor(innerHeight * dpr);
    canvas.style.width = innerWidth + 'px';
    canvas.style.height = innerHeight + 'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  window.addEventListener('resize', resize);

  function makeBoard() {
    boardEl.innerHTML = '';
    boardTiles.length = 0;
    for (let r=0; r<6; r++) {
      const rowEl = document.createElement('div');
      rowEl.className = 'row';
      const rr = [];
      for (let c=0; c<5; c++) {
        const t = document.createElement('div');
        t.className = 'tile';
        rowEl.appendChild(t);
        rr.push(t);
      }
      boardEl.appendChild(rowEl);
      boardTiles.push(rr);
    }
  }

  const keyLayout = [
    ['Q','W','E','R','T','Y','U','I','O','P'],
    ['A','S','D','F','G','H','J','K','L'],
    ['ENTER','Z','X','C','V','B','N','M','⌫']
  ];
  function makeKeyboard() {
    keyboardEl.innerHTML = '';
    keyButtons.clear();
    for (const rowKeys of keyLayout) {
      const rowEl = document.createElement('div');
      rowEl.className = 'keyrow';
      for (const k of rowKeys) {
        const b = document.createElement('button');
        b.className = 'key' + ((k === 'ENTER' || k === '⌫') ? ' wide' : '');
        b.textContent = k === 'ENTER' ? 'Enter' : (k === '⌫' ? 'Backspace' : k);
        b.addEventListener('click', () => handleInput(k));
        rowEl.appendChild(b);
        if (k.length === 1 && /[A-Z]/.test(k)) keyButtons.set(k, b);
      }
      keyboardEl.appendChild(rowEl);
    }
  }

  function drawBG() {
    ctx.clearRect(0,0,innerWidth,innerHeight);
    const g = ctx.createLinearGradient(0,0,0,innerHeight);
    g.addColorStop(0,'rgba(123,140,255,0.08)');
    g.addColorStop(0.5,'rgba(255,255,255,0.02)');
    g.addColorStop(1,'rgba(0,0,0,0.12)');
    ctx.fillStyle = g;
    ctx.fillRect(0,0,innerWidth,innerHeight);
    for (let i=0;i<24;i++){
      const x = (i*97 + performance.now()*0.01) % (innerWidth+80) - 40;
      const y = (i*53) % innerHeight;
      ctx.fillStyle = 'rgba(255,255,255,0.03)';
      ctx.beginPath(); ctx.arc(x,y,2+(i%3),0,Math.PI*2); ctx.fill();
    }
  }

  function updateMessage(txt, timeout=0){
    messageEl.textContent = txt;
    if(timeout){
      clearTimeout(updateMessage.t);
      updateMessage.t = setTimeout(()=>{ if(!gameOver) messageEl.textContent = 'Guess the 5-letter word. Press Enter to submit.'; }, timeout);
    }
  }

  function renderBoard() {
    for (let r=0; r<6; r++) {
      for (let c=0; c<5; c++) {
        const tile = boardTiles[r][c];
        const ch = guesses[r][c];
        tile.textContent = ch;
        tile.className = 'tile' + (ch ? ' filled' : '');
        if (states[r][c]) tile.classList.add(states[r][c]);
        if (r === row && c === col && !gameOver) tile.classList.add('pop');
      }
    }
  }

  function updateKeyColors(letter, state){
    const btn = keyButtons.get(letter);
    if (!btn) return;
    const rank = { absent:1, present:2, correct:3 };
    const current = btn.dataset.state || '';
    if (rank[state] >= (rank[current] || 0)) {
      btn.dataset.state = state;
      btn.classList.remove('absent','present','correct');
      btn.classList.add(state);
    }
  }

  function evaluateGuess(guess) {
    const res = Array(5).fill('absent');
    const target = answer.split('');
    const used = Array(5).fill(false);
    for (let i=0;i<5;i++) if (guess[i] === target[i]) { res[i] = 'correct'; used[i] = true; }
    for (let i=0;i<5;i++) {
      if (res[i] === 'correct') continue;
      const idx = target.findIndex((ch,j)=>!used[j] && ch === guess[i]);
      if (idx !== -1) { res[i] = 'present'; used[idx] = true; }
    }
    return res;
  }

  function setRowShake(r){
    for (let c=0;c<5;c++) boardTiles[r][c].classList.add('shake');
    setTimeout(()=>{ for (let c=0;c<5;c++) boardTiles[r][c].classList.remove('shake'); }, 300);
  }

  function commitGuess() {
    const guess = guesses[row].join('');
    if (guess.length < 5) return updateMessage('Not enough letters.', 900), setRowShake(row);
    if (!/^[A-Za-z]{5}$/.test(guess)) return updateMessage('5글자 영어 단어만 입력하세요.', 1100), setRowShake(row);
    const evals = evaluateGuess(guess);
    for (let i=0;i<5;i++) states[row][i] = evals[i];
    for (let i=0;i<5;i++) updateKeyColors(guess[i], evals[i]);
    renderBoard();
    if (guess === answer) {
      gameOver = true;
      streak++;
      streakChip.textContent = 'Streak: ' + streak;
      resultText.textContent = 'You won in ' + (row+1) + '/6!';
      updateMessage('Correct! The word was ' + answer + '. Press R or Restart to play again.');
      return;
    }
    row++;
    col = 0;
    if (row >= 6) {
      gameOver = true;
      streak = 0;
      streakChip.textContent = 'Streak: 0';
      resultText.textContent = 'Answer: ' + answer;
      updateMessage('Out of tries! The word was ' + answer + '. Press R or Restart.');
    } else {
      updateMessage('Try again.');
    }
  }

  function handleInput(key){
    if (gameOver) return;
    if (key === 'ENTER') return commitGuess();
    if (key === '⌫' || key === 'BACKSPACE') {
      if (col > 0) { col--; guesses[row][col] = ''; renderBoard(); }
      return;
    }
    if (/^[A-Z]$/.test(key)) {
      if (col < 5) {
        guesses[row][col] = key;
        col++;
        renderBoard();
      }
    }
  }

  function restartGame(){
    location.reload();
  }

  document.addEventListener('keydown', e => {
    const k = e.key;
    if ((k === 'r' || k === 'R') && gameOver) return restartGame();  // 'r'은 게임오버 때만 재시작(플레이 중엔 글자 입력)
    if (k === 'Enter') return handleInput('ENTER');
    if (k === 'Backspace') return handleInput('BACKSPACE');
    if (/^[a-zA-Z]$/.test(k)) return handleInput(k.toUpperCase());
  });
  restartBtn.addEventListener('click', restartGame);

  function loop(){
    drawBG();
    renderBoard();
    requestAnimationFrame(loop);
  }

  resize();
  makeBoard();
  makeKeyboard();
  updateMessage('Guess the 5-letter word. Press Enter to submit.');
  loop();
})();
</script>
</body>
</html>
