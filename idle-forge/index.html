<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Cookie Burst Idle</title>
  <style>
    :root{
      --bg:#0f1220;
      --panel:#171b2f;
      --panel2:#202647;
      --accent:#ffd166;
      --accent2:#7af0c6;
      --danger:#ff6b6b;
      --text:#eef3ff;
      --muted:#9aa5c7;
      --line:#313b63;
      --good:#7ef08a;
    }
    html,body{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background: radial-gradient(circle at top, #1a2140 0%, #0f1220 55%, #090b13 100%);
      color:var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      user-select:none;
      touch-action:none;
    }
    canvas{
      display:block;
      width:100vw;
      height:100vh;
    }
  </style>
</head>
<body>
<canvas id="game"></canvas>
<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  let W = 1280, H = 720, DPR = 1;

  const state = {
    mode: 'playing',
    coins: 0,
    totalCoins: 0,
    clicks: 0,
    clickPower: 1,
    clickBonus: 0,
    cps: 0,
    floating: [],
    bursts: [],
    stars: [],
    shake: 0,
    message: '',
    messageT: 0,
    autosaveT: 0,
    prestige: 0,
    lastTime: performance.now(),
    buttons: []
  };

  const shopItems = [
    { id:'cursor', name:'Cursor Bot', desc:'자동 클릭 +1/s', base:15, mult:1.15, amount:0, cps:1, kind:'unit' },
    { id:'grandma', name:'Grandma Oven', desc:'수제 쿠키 +5/s', base:80, mult:1.18, amount:0, cps:5, kind:'unit' },
    { id:'factory', name:'Snack Factory', desc:'공장 생산 +25/s', base:400, mult:1.2, amount:0, cps:25, kind:'unit' },
    { id:'portal', name:'Sugar Portal', desc:'차원 생산 +120/s', base:2000, mult:1.22, amount:0, cps:120, kind:'unit' },
    { id:'glove', name:'Better Glove', desc:'클릭당 +1', base:25, mult:1.17, amount:0, click:1, kind:'upgrade' },
    { id:'jam', name:'Jam Tuning', desc:'클릭 효율 x1.25', base:180, mult:1.22, amount:0, clickMult:1.25, kind:'upgrade' }
  ];

  function resize(){
    DPR = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
    W = canvas.width = Math.floor(window.innerWidth * DPR);
    H = canvas.height = Math.floor(window.innerHeight * DPR);
  }
  window.addEventListener('resize', resize, { passive:true });
  resize();

  function rand(a,b){ return a + Math.random()*(b-a); }
  function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }
  function fmt(n){
    if (!isFinite(n)) return '∞';
    const abs = Math.abs(n);
    if (abs < 1000) return n.toFixed(n < 10 ? 1 : 0);
    const units = ['K','M','B','T','Qa','Qi','Sx','Sp','Oc','No'];
    let u = -1;
    let v = abs;
    while (v >= 1000 && u < units.length-1) { v /= 1000; u++; }
    const sign = n < 0 ? '-' : '';
    return sign + v.toFixed(v < 10 ? 2 : v < 100 ? 1 : 0) + units[u];
  }

  function addFloating(text, x, y, color='#fff', size=22, vy=-40){
    state.floating.push({ text, x, y, color, size, vy, life: 1.2 });
  }
  function addBurst(x, y, color){
    for(let i=0;i<16;i++){
      state.bursts.push({
        x,y, vx: Math.cos((i/16)*Math.PI*2)*rand(40,220),
        vy: Math.sin((i/16)*Math.PI*2)*rand(40,220) - rand(30,120),
        life: rand(0.35,0.8), color
      });
    }
  }
  function gain(amount, x, y, fromClick=false){
    if (amount <= 0) return;
    state.coins += amount;
    state.totalCoins += amount;
    state.shake = Math.min(10, state.shake + Math.min(6, amount*0.1));
    if (fromClick) state.clicks++;
    addFloating('+' + fmt(amount), x ?? W/DPR*0.5, y ?? H/DPR*0.5, fromClick ? '#ffd166' : '#7af0c6', fromClick ? 24 : 20, fromClick ? -80 : -50);
  }
  function updateCPS(){
    let cps = 0;
    let clickPower = 1;
    let clickMult = 1;
    for(const item of shopItems){
      const cost = item.base * Math.pow(item.mult, item.amount);
      if (item.kind === 'unit') cps += item.cps * item.amount;
      if (item.kind === 'upgrade'){
        if (item.click) clickPower += item.click * item.amount;
        if (item.clickMult) clickMult *= Math.pow(item.clickMult, item.amount);
      }
    }
    state.clickPower = clickPower;
    state.clickBonus = clickMult;
    state.cps = cps * (1 + state.prestige * 0.05);
  }
  function resetGame(){
    state.coins = 0;
    state.totalCoins = 0;
    state.clicks = 0;
    state.prestige = 0;
    state.floating = [];
    state.bursts = [];
    state.mode = 'playing';
    for(const item of shopItems) item.amount = 0;
    updateCPS();
    state.message = '새 게임 시작!';
    state.messageT = 1.5;
  }

  function buy(item){
    const cost = item.base * Math.pow(item.mult, item.amount);
    if (state.coins < cost || state.mode !== 'playing') return false;
    state.coins -= cost;
    item.amount++;
    updateCPS();
    addFloating('구매!', W/DPR - 260, itemButtonY(item) + 28, '#7ef08a', 18, -20);
    state.message = item.name + ' 획득!';
    state.messageT = 1.6;
    return true;
  }

  function itemButtonY(item){
    const idx = shopItems.indexOf(item);
    return 180 + idx * 74;
  }

  function drawRoundedRect(x,y,w,h,r,fill,stroke){
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);
    ctx.arcTo(x,y,x+w,y,r);
    ctx.closePath();
    if (fill) { ctx.fillStyle = fill; ctx.fill(); }
    if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = 2*DPR; ctx.stroke(); }
  }

  function draw(){
    ctx.clearRect(0,0,W,H);
    const sw = W / DPR, sh = H / DPR;
    ctx.save();
    if (state.shake > 0){
      const s = state.shake;
      ctx.translate(rand(-s,s)*DPR*0.5, rand(-s,s)*DPR*0.5);
    }

    const grd = ctx.createLinearGradient(0,0,0,H);
    grd.addColorStop(0,'#1a2140');
    grd.addColorStop(1,'#090b13');
    ctx.fillStyle = grd;
    ctx.fillRect(0,0,W,H);

    for(const star of state.stars){
      ctx.globalAlpha = star.a;
      ctx.fillStyle = star.c;
      ctx.beginPath();
      ctx.arc(star.x*DPR, star.y*DPR, star.r*DPR, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    drawRoundedRect(16*DPR, 16*DPR, (sw-32)*DPR, 70*DPR, 18*DPR, 'rgba(17,20,35,0.88)', 'rgba(90,102,150,0.35)');
    ctx.fillStyle = '#eef3ff';
    ctx.font = `${24*DPR}px system-ui, sans-serif`;
    ctx.fillText('Cookie Burst Idle', 36*DPR, 62*DPR);
    ctx.fillStyle = '#9aa5c7';
    ctx.font = `${14*DPR}px system-ui, sans-serif`;
    ctx.fillText('클릭으로 쿠키를 모으고, 자동 생산과 업그레이드로 점점 더 빨라집니다.', 36*DPR, 84*DPR);

    drawRoundedRect(16*DPR, 102*DPR, 300*DPR, (sh-118)*DPR, 18*DPR, 'rgba(23,27,47,0.92)', 'rgba(90,102,150,0.35)');
    drawRoundedRect((sw-340)*DPR, 102*DPR, 324*DPR, (sh-118)*DPR, 18*DPR, 'rgba(23,27,47,0.92)', 'rgba(90,102,150,0.35)');

    const centerX = sw*0.5;
    const centerY = sh*0.53;
    const cookieR = Math.min(sw, sh) * 0.12;
    const btn = { x:centerX, y:centerY, r:cookieR };

    ctx.save();
    ctx.translate(centerX*DPR, centerY*DPR);
    const pulse = 1 + Math.sin(performance.now()*0.004)*0.02;
    ctx.scale(pulse, pulse);
    ctx.fillStyle = '#d79a55';
    ctx.beginPath(); ctx.arc(0,0,cookieR*DPR,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#c37d3f';
    for(let i=0;i<18;i++){
      const a = i * 0.55;
      const rr = cookieR*(0.18 + (i%5)*0.07);
      ctx.beginPath();
      ctx.arc(Math.cos(a)*cookieR*0.45*DPR, Math.sin(a)*cookieR*0.35*DPR, rr*DPR*0.09, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.strokeStyle = 'rgba(255,255,255,0.16)';
    ctx.lineWidth = 5*DPR;
    ctx.beginPath(); ctx.arc(0,0,cookieR*DPR,0,Math.PI*2); ctx.stroke();
    ctx.restore();

    ctx.fillStyle = '#ffd166';
    ctx.font = `700 ${44*DPR}px system-ui, sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText('CLICK!', centerX*DPR, (centerY + cookieR + 38)*DPR);
    ctx.fillStyle = '#9aa5c7';
    ctx.font = `${16*DPR}px system-ui, sans-serif`;
    ctx.fillText('클릭 시 + ' + fmt(state.clickPower * state.clickBonus), centerX*DPR, (centerY + cookieR + 64)*DPR);

    ctx.textAlign = 'left';
    ctx.fillStyle = '#eef3ff';
    ctx.font = `700 ${18*DPR}px system-ui, sans-serif`;
    ctx.fillText('상태', 32*DPR, 142*DPR);
    ctx.fillText('상점', (sw-324+20)*DPR, 142*DPR);

    const stats = [
      ['쿠키', fmt(state.coins)],
      ['초당 생산', fmt(state.cps)],
      ['클릭당', fmt(state.clickPower * state.clickBonus)],
      ['누적 쿠키', fmt(state.totalCoins)]
    ];
    ctx.font = `${18*DPR}px system-ui, sans-serif`;
    stats.forEach((s, i) => {
      const y = 184 + i*72;
      drawRoundedRect(32*DPR, (y-22)*DPR, 268*DPR, 58*DPR, 14*DPR, 'rgba(32,38,71,0.95)', 'rgba(90,102,150,0.22)');
      ctx.fillStyle = '#9aa5c7'; ctx.fillText(s[0], 48*DPR, y*DPR);
      ctx.fillStyle = '#7af0c6'; ctx.fillText(s[1], 182*DPR, y*DPR);
    });

    ctx.fillStyle = '#9aa5c7';
    ctx.font = `${15*DPR}px system-ui, sans-serif`;
    ctx.fillText('조작', 32*DPR, sh*DPR - 178*DPR);
    ctx.fillStyle = '#eef3ff';
    ctx.fillText('클릭/탭: 쿠키 획득', 32*DPR, sh*DPR - 150*DPR);
    ctx.fillText('숫자키 1-6: 상점 구매', 32*DPR, sh*DPR - 126*DPR);
    ctx.fillText('R: 재시작', 32*DPR, sh*DPR - 102*DPR);

    ctx.fillStyle = state.messageT > 0 ? '#ffd166' : '#9aa5c7';
    ctx.font = `700 ${18*DPR}px system-ui, sans-serif`;
    ctx.fillText(state.messageT > 0 ? state.message : '목표: 생산을 키워 폭발적으로 성장하세요!', 32*DPR, sh*DPR - 62*DPR);

    shopItems.forEach((item, i) => {
      const x = sw - 324 + 16;
      const y = 164 + i*74;
      const w = 292, h = 62;
      const cost = item.base * Math.pow(item.mult, item.amount);
      const affordable = state.coins >= cost;
      drawRoundedRect(x*DPR, y*DPR, w*DPR, h*DPR, 14*DPR, affordable ? 'rgba(32,38,71,0.98)' : 'rgba(23,27,47,0.98)', affordable ? 'rgba(122,240,198,0.45)' : 'rgba(90,102,150,0.25)');
      ctx.fillStyle = '#eef3ff';
      ctx.font = `700 ${17*DPR}px system-ui, sans-serif`;
      ctx.fillText((i+1)+'. '+item.name, (x+16)*DPR, (y+24)*DPR);
      ctx.fillStyle = '#9aa5c7';
      ctx.font = `${13*DPR}px system-ui, sans-serif`;
      ctx.fillText(item.desc, (x+16)*DPR, (y+43)*DPR);
      ctx.fillStyle = affordable ? '#7ef08a' : '#ff6b6b';
      ctx.font = `700 ${15*DPR}px system-ui, sans-serif`;
      ctx.fillText(fmt(cost), (x+w-82)*DPR, (y+24)*DPR);
      ctx.fillStyle = '#9aa5c7';
      ctx.font = `${12*DPR}px system-ui, sans-serif`;
      ctx.fillText('보유 ' + item.amount, (x+w-82)*DPR, (y+43)*DPR);
    });

    ctx.textAlign = 'center';
    ctx.fillStyle = '#eef3ff';
    ctx.font = `700 ${16*DPR}px system-ui, sans-serif`;
    ctx.fillText('하단 중앙 큰 쿠키를 눌러 수확!', centerX*DPR, (centerY - cookieR - 18)*DPR);

    for(const b of state.bursts){
      ctx.globalAlpha = clamp(b.life*1.4,0,1);
      ctx.fillStyle = b.color;
      ctx.beginPath();
      ctx.arc(b.x*DPR, b.y*DPR, 3.2*DPR, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    for(const f of state.floating){
      ctx.globalAlpha = clamp(f.life,0,1);
      ctx.fillStyle = f.color;
      ctx.font = `700 ${f.size*DPR}px system-ui, sans-serif`;
      ctx.fillText(f.text, f.x*DPR, f.y*DPR);
    }
    ctx.globalAlpha = 1;

    if (state.mode !== 'playing'){
      ctx.fillStyle = 'rgba(0,0,0,0.55)';
      ctx.fillRect(0,0,W,H);
      drawRoundedRect(360*DPR, 180*DPR, 560*DPR, 260*DPR, 24*DPR, 'rgba(17,20,35,0.98)', 'rgba(255,209,102,0.45)');
      ctx.textAlign = 'center';
      ctx.fillStyle = '#ffd166';
      ctx.font = `800 ${42*DPR}px system-ui, sans-serif`;
      ctx.fillText('게임 종료', W/2, 260*DPR);
      ctx.fillStyle = '#eef3ff';
      ctx.font = `${20*DPR}px system-ui, sans-serif`;
      ctx.fillText('R 키 또는 재시작 버튼으로 다시 시작할 수 있습니다.', W/2, 314*DPR);
      ctx.fillStyle = '#9aa5c7';
      ctx.font = `${18*DPR}px system-ui, sans-serif`;
      ctx.fillText('목표를 더 확장하고 싶다면, 더 많은 자동 생산과 업그레이드를 구매하세요.', W/2, 356*DPR);
      drawButton(W/2 - 110, 384, 220, 52, '재시작', '#ffd166', '#3a2b0d');
      ctx.textAlign = 'left';
    } else {
      drawButton(sw-240, 32, 208, 44, 'R 재시작', '#ff6b6b', '#3b0f0f');
    }

    ctx.restore();
  }

  function drawButton(x,y,w,h,text,fill,border){
    drawRoundedRect(x*DPR, y*DPR, w*DPR, h*DPR, 14*DPR, fill, border);
    ctx.fillStyle = '#0f1220';
    ctx.font = `700 ${16*DPR}px system-ui, sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText(text, (x+w/2)*DPR, (y+h/2+6)*DPR);
    ctx.textAlign = 'left';
  }

  function hitCookie(px,py){
    const x = W/DPR*0.5, y = H/DPR*0.53, r = Math.min(W/DPR,H/DPR)*0.12;
    const dx = px - x, dy = py - y;
    return dx*dx + dy*dy <= r*r;
  }

  function handleClick(px,py){
    if (state.mode !== 'playing'){
      if (px >= W/DPR/2 - 110 && px <= W/DPR/2 + 110 && py >= 384 && py <= 436) resetGame();
      return;
    }
    if (px > W/DPR - 240 && px < W/DPR - 32 && py > 32 && py < 76) { resetGame(); return; }
    for(let i=0;i<shopItems.length;i++){
      const x = W/DPR - 308, y = 164 + i*74, w = 292, h = 62;
      if (px>=x && px<=x+w && py>=y && py<=y+h) { buy(shopItems[i]); return; }
    }
    if (hitCookie(px,py)){
      const gainAmt = state.clickPower * state.clickBonus;
      gain(gainAmt, px, py, true);
      addBurst(px, py, '#ffd166');
    }
  }

  canvas.addEventListener('pointerdown', e => {
    const r = canvas.getBoundingClientRect();
    handleClick((e.clientX - r.left) / r.width * (W / DPR), (e.clientY - r.top) / r.height * (H / DPR));
  });

  window.addEventListener('keydown', e => {
    if (e.key.toLowerCase() === 'r') { resetGame(); return; }
    const n = parseInt(e.key, 10);
    if (n >= 1 && n <= 6) buy(shopItems[n-1]);
  });

  function loop(t){
    const dt = Math.min(0.033, (t - state.lastTime) / 1000);
    state.lastTime = t;
    if (state.mode === 'playing'){
      state.coins += state.cps * dt;
      state.totalCoins += state.cps * dt;
    }
    state.messageT = Math.max(0, state.messageT - dt);
    state.shake = Math.max(0, state.shake - dt * 16);

    for(const f of state.floating){
      f.life -= dt;
      f.y += f.vy * dt;
    }
    state.floating = state.floating.filter(f => f.life > 0);

    for(const b of state.bursts){
      b.life -= dt;
      b.x += b.vx * dt;
      b.y += b.vy * dt;
      b.vy += 240 * dt;
    }
    state.bursts = state.bursts.filter(b => b.life > 0);

    if (state.stars.length === 0){
      for(let i=0;i<70;i++){
        state.stars.push({ x:Math.random()*W/DPR, y:Math.random()*H/DPR, r:Math.random()*1.8+0.3, a:Math.random()*0.8+0.2, c:['#ffffff','#d9e5ff','#ffd166'][Math.floor(Math.random()*3)] });
      }
    }
    for(const s of state.stars){
      s.y += (10 + s.r*8) * dt;
      if (s.y > H/DPR + 5) { s.y = -5; s.x = Math.random()*W/DPR; }
      s.a = 0.2 + Math.sin((t*0.001 + s.x*0.01))*0.2 + 0.25;
    }

    updateCPS();
    draw();
    requestAnimationFrame(loop);
  }
  updateCPS();
  state.message = '쿠키 공장 가동 준비 완료!';
  state.messageT = 2;
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
