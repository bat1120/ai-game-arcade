<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Moss Clock: Daily Puzzle</title>
<style>
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: radial-gradient(circle at 50% 30%, #1f2a24 0%, #0d1110 55%, #070908 100%);
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: #edf5ef;
    touch-action: none;
    user-select: none;
  }
  canvas {
    display: block;
    width: 100vw;
    height: 100vh;
  }
  .hud {
    position: fixed;
    inset: 0;
    pointer-events: none;
  }
  .topbar, .bottombar {
    position: absolute;
    left: 0;
    right: 0;
    display: flex;
    justify-content: space-between;
    gap: 12px;
    padding: 12px 14px;
    box-sizing: border-box;
  }
  .topbar { top: 0; align-items: flex-start; }
  .bottombar { bottom: 0; align-items: flex-end; }
  .panel {
    pointer-events: none;
    background: rgba(10, 15, 12, 0.42);
    border: 1px solid rgba(180, 220, 190, 0.14);
    backdrop-filter: blur(6px);
    border-radius: 14px;
    padding: 10px 12px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.28);
  }
  .title {
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-size: 12px;
    opacity: 0.95;
  }
  .small {
    font-size: 12px;
    line-height: 1.45;
    opacity: 0.9;
  }
  .big {
    font-size: 18px;
    font-weight: 800;
    letter-spacing: 0.02em;
  }
  .controls {
    max-width: min(520px, 70vw);
  }
  .status {
    min-width: 170px;
  }
  .btnrow {
    display: flex;
    gap: 8px;
    margin-top: 8px;
  }
  button {
    pointer-events: auto;
    border: 0;
    color: #eff9f2;
    background: linear-gradient(180deg, rgba(85,122,96,0.88), rgba(49,73,57,0.88));
    border-radius: 11px;
    padding: 9px 12px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(0,0,0,0.25);
  }
  button:active { transform: translateY(1px); }
  .hintline {
    opacity: 0.95;
  }
  .progresswrap {
    width: 190px;
  }
  .progressbar {
    height: 10px;
    border-radius: 999px;
    background: rgba(255,255,255,0.08);
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .progressfill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #d6f5a4, #7ee3ad, #6ee8ff);
    box-shadow: 0 0 18px rgba(129, 255, 201, 0.35);
  }
  .overlay {
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(4, 7, 5, 0.72);
    backdrop-filter: blur(6px);
    z-index: 10;
  }
  .overlay.show { display: flex; }
  .card {
    width: min(520px, calc(100vw - 28px));
    background: linear-gradient(180deg, rgba(18, 28, 22, 0.96), rgba(8, 12, 10, 0.96));
    border: 1px solid rgba(190, 240, 205, 0.15);
    border-radius: 20px;
    padding: 18px 18px 16px;
    box-shadow: 0 20px 70px rgba(0,0,0,0.42);
    text-align: center;
  }
  .card h1 {
    margin: 0 0 8px;
    font-size: 24px;
    letter-spacing: 0.04em;
  }
  .card p {
    margin: 8px 0;
    line-height: 1.55;
    color: rgba(237,245,239,0.88);
  }
  .kbd {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 7px;
    border: 1px solid rgba(255,255,255,0.16);
    background: rgba(255,255,255,0.06);
    font-weight: 700;
    font-size: 12px;
  }
</style>
</head>
<body>
<canvas id="game"></canvas>

<div class="hud">
  <div class="topbar">
    <div class="panel controls">
      <div class="title">Moss Clock · Daily Puzzle</div>
      <div class="small hintline">
        탭/클릭: 타일 회전 · 드래그: 경로 미리보기 후 놓기 · 목표 숫자를 <b>1 → 2 → 3 ...</b> 순서대로 켜세요.<br>
        빛이 이웃 타일과 연결되면 경로가 이어집니다. 8턴 안에 모두 활성화하면 승리.
      </div>
    </div>
    <div class="panel status">
      <div class="title">진행</div>
      <div class="big" id="turnText">남은 턴: 8</div>
      <div class="small" id="goalText">현재 목표: 1</div>
      <div class="small" id="pathText">연결 경로: 0</div>
      <div class="small">최고 기록: <span id="bestText">0</span></div>
    </div>
  </div>

  <div class="bottombar">
    <div class="panel progresswrap">
      <div class="title">완성도 게이지</div>
      <div class="progressbar"><div class="progressfill" id="progressFill"></div></div>
      <div class="small" id="progressText">0 / 5</div>
    </div>
    <div class="panel">
      <div class="title">조작</div>
      <div class="small">
        <span class="kbd">R</span> 재시작 · <span class="kbd">Space</span> 턴 확정/자동 진행<br>
        타일에 표시된 화살표 방향이 서로 맞닿아야 연결됩니다.
      </div>
    </div>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="card">
    <h1 id="resultTitle">완료</h1>
    <p id="resultText"></p>
    <div class="btnrow" style="justify-content:center;">
      <button id="restartBtn">다시 시작</button>
    </div>
  </div>
</div>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const turnText = document.getElementById('turnText');
  const goalText = document.getElementById('goalText');
  const pathText = document.getElementById('pathText');
  const progressFill = document.getElementById('progressFill');
  const progressText = document.getElementById('progressText');
  const bestText = document.getElementById('bestText');
  const overlay = document.getElementById('overlay');
  const resultTitle = document.getElementById('resultTitle');
  const resultText = document.getElementById('resultText');
  const restartBtn = document.getElementById('restartBtn');

  const N = 5;
  const MAX_TURNS = 8;
  const DIRS = [
    {x:0,y:-1, a:-Math.PI/2},
    {x:1,y:0, a:0},
    {x:0,y:1, a:Math.PI/2},
    {x:-1,y:0, a:Math.PI}
  ];

  let W=0,H=0, dpr=1, cell=0, boardX=0, boardY=0, boardSize=0;
  let tiles = [];
  let currentTarget = 1;
  let turnsLeft = MAX_TURNS;
  let score = 0;
  let pathLen = 0;
  let won = false;
  let lost = false;
  let anim = 0;
  let pointer = {x:0,y:0, down:false, startX:0, startY:0, tile:null, moved:false};

  const storageKey = "moss_clock_best_v1";
  let best = +localStorage.getItem(storageKey) || 0;
  bestText.textContent = best;

  function randInt(n){ return Math.floor(Math.random()*n); }
  function clamp(v,a,b){ return Math.max(a,Math.min(b,v)); }
  function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=randInt(i+1); [a[i],a[j]]=[a[j],a[i]]; } return a; }

  function makeTile(idx){
    return {
      rot: randInt(4),
      links: [false,false,false,false],
      moss: Math.random(),
      lit: false,
      pulse: 0,
      num: 0,
      numLit: false,
      x: idx%N,
      y: (idx/N)|0
    };
  }

  function genBoard(){
    tiles = Array.from({length:N*N}, (_,i)=>makeTile(i));
    const basePath = [
      [0,2],[1,2],[1,1],[2,1],[2,0],[3,0],[3,1],[4,1],[4,2],[4,3],[3,3],[3,4],[2,4],[1,4]
    ];
    const nums = [1,2,3,4,5];
    for(let i=0;i<basePath.length-1;i++){
      const [ax,ay]=basePath[i], [bx,by]=basePath[i+1];
      const a = tiles[ay*N+ax], b = tiles[by*N+bx];
      const d = DIRS.findIndex(v=>v.x===bx-ax && v.y===by-ay);
      a.links[d] = true;
      b.links[(d+2)%4] = true;
    }
    const numbered = shuffle(basePath.slice()).slice(0,5);
    numbered.sort((p,q)=>basePath.findIndex(v=>v[0]===p[0]&&v[1]===p[1]) - basePath.findIndex(v=>v[0]===q[0]&&v[1]===q[1]));
    numbered.forEach((p,i)=> {
      const t = tiles[p[1]*N+p[0]];
      t.num = nums[i];
      t.numLit = false;
    });
    for(const t of tiles){
      t.rot = randInt(4);
      if (Math.random() < 0.2 && t.num===0) {
        const a = randInt(4), b = (a+2)%4;
        t.links[a] = t.links[b] = true;
      }
    }
    currentTarget = 1;
    turnsLeft = MAX_TURNS;
    score = 0;
    pathLen = 0;
    won = false;
    lost = false;
    overlay.classList.remove('show');
    syncUI();
  }

  function syncUI(){
    turnText.textContent = `남은 턴: ${turnsLeft}`;
    goalText.textContent = `현재 목표: ${currentTarget <= 5 ? currentTarget : '완료'}`;
    pathText.textContent = `연결 경로: ${pathLen}`;
    const done = currentTarget - 1;
    progressFill.style.width = `${(done/5)*100}%`;
    progressText.textContent = `${done} / 5`;
  }

  function resize(){
    dpr = Math.max(1, Math.min(2, devicePixelRatio || 1));
    W = canvas.clientWidth = window.innerWidth;
    H = canvas.clientHeight = window.innerHeight;
    canvas.width = Math.floor(W*dpr);
    canvas.height = Math.floor(H*dpr);
    ctx.setTransform(dpr,0,0,dpr,0,0);
    const minSide = Math.min(W,H);
    boardSize = Math.min(minSide * 0.78, 560);
    cell = boardSize / N;
    boardX = (W - boardSize)/2;
    boardY = (H - boardSize)/2 + Math.max(14, H*0.02);
  }

  function tileAt(px,py){
    const gx = Math.floor((px-boardX)/cell);
    const gy = Math.floor((py-boardY)/cell);
    if(gx<0||gy<0||gx>=N||gy>=N) return null;
    return tiles[gy*N+gx];
  }

  function tilePos(t){
    return {x: boardX + t.x*cell + cell/2, y: boardY + t.y*cell + cell/2};
  }

  function rotateTile(t, dir=1){
    if(won || lost) return;
    t.rot = (t.rot + dir + 4) % 4;
    t.pulse = 1;
  }

  function finalizeTurn(){
    if(won || lost) return;
    turnsLeft--;
    evaluate();
    if(!won && turnsLeft <= 0) finish(false);
    syncUI();
  }

  function connectedNeighbors(i){
    const t = tiles[i];
    const res = [];
    for(let d=0; d<4; d++){
      if(!t.links[(d - t.rot + 4)%4]) continue;
      const nx=t.x+DIRS[d].x, ny=t.y+DIRS[d].y;
      if(nx<0||ny<0||nx>=N||ny>=N) continue;
      const j=ny*N+nx, u=tiles[j];
      const od=(d+2)%4;
      if(u.links[(od - u.rot + 4)%4]) res.push(j);
    }
    return res;
  }

  function evaluate(){
    tiles.forEach(t=>{ t.lit=false; });
    const start = tiles.findIndex(t=>t.num===1);
    let frontier = [start];
    const seen = new Set([start]);
    tiles[start].lit = true;
    let reached = 0;
    let lastTargetIdx = start;
    while(frontier.length){
      const next = [];
      for(const i of frontier){
        const t = tiles[i];
        if(t.num === currentTarget && !t.numLit){
          t.numLit = true;
          score += 100 + currentTarget * 25;
          reached = currentTarget;
          lastTargetIdx = i;
        }
        for(const j of connectedNeighbors(i)){
          if(!seen.has(j)){
            seen.add(j);
            tiles[j].lit = true;
            next.push(j);
          }
        }
      }
      frontier = next;
    }
    pathLen = seen.size - 1;
    if(reached === currentTarget){
      currentTarget++;
      if(currentTarget > 5) finish(true);
    }
    score += Math.max(0, pathLen * 6);
    if(score > best){
      best = score;
      localStorage.setItem(storageKey, String(best));
      bestText.textContent = best;
    }
    syncUI();
  }

  function finish(win){
    won = win;
    lost = !win;
    resultTitle.textContent = win ? "성공!" : "실패";
    resultText.textContent = win
      ? `모든 숫자 마커를 순서대로 활성화했습니다. 점수 ${score}점.`
      : `8턴 안에 목표를 완료하지 못했습니다. 점수 ${score}점. 다시 시도해 보세요.`;
    overlay.classList.add('show');
  }

  function drawBackground(){
    const g = ctx.createRadialGradient(W*0.5, H*0.32, 40, W*0.5, H*0.5, Math.max(W,H)*0.7);
    g.addColorStop(0, '#203327');
    g.addColorStop(0.45, '#101915');
    g.addColorStop(1, '#070908');
    ctx.fillStyle = g;
    ctx.fillRect(0,0,W,H);

    ctx.save();
    ctx.globalAlpha = 0.12;
    for(let y=0;y<H;y+=26){
      ctx.fillStyle = y%52===0 ? '#7abf88' : '#ffffff';
      ctx.fillRect(0,y,W,1);
    }
    ctx.restore();
  }

  function drawBoard(){
    const cx = boardX + boardSize/2;
    const cy = boardY + boardSize/2;
    ctx.save();
    ctx.translate(cx, cy);
    ctx.fillStyle = 'rgba(12,17,14,0.72)';
    ctx.beginPath();
    ctx.roundRect(-boardSize/2-16, -boardSize/2-16, boardSize+32, boardSize+32, 28);
    ctx.fill();
    ctx.strokeStyle = 'rgba(210,240,220,0.14)';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.restore();

    for(let y=0;y<N;y++){
      for(let x=0;x<N;x++){
        const t = tiles[y*N+x];
        const px = boardX + x*cell;
        const py = boardY + y*cell;
        const tx = px + cell/2, ty = py + cell/2;
        const lit = t.lit || t.numLit;
        const hue = lit ? 132 : 92;
        ctx.save();
        ctx.translate(tx, ty);
        const glow = lit ? 1 : 0.18;
        ctx.shadowColor = lit ? 'rgba(145,255,192,0.28)' : 'rgba(0,0,0,0)';
        ctx.shadowBlur = lit ? 18 : 0;
        ctx.fillStyle = `hsla(${hue}, 20%, ${lit ? 34 : 22}%, 0.92)`;
        ctx.beginPath();
        ctx.roundRect(-cell*0.47, -cell*0.47, cell*0.94, cell*0.94, cell*0.12);
        ctx.fill();

        const mossGrad = ctx.createRadialGradient(-cell*0.12, -cell*0.1, cell*0.05, 0, 0, cell*0.52);
        mossGrad.addColorStop(0, lit ? 'rgba(180,240,170,0.44)' : 'rgba(120,160,120,0.22)');
        mossGrad.addColorStop(1, 'rgba(30,40,32,0.12)');
        ctx.fillStyle = mossGrad;
        ctx.fill();

        ctx.strokeStyle = lit ? 'rgba(205,255,218,0.30)' : 'rgba(255,255,255,0.08)';
        ctx.lineWidth = 1.5;
        ctx.stroke();

        ctx.save();
        ctx.rotate(t.rot * Math.PI/2);
        ctx.lineWidth = cell*0.11;
        ctx.lineCap = 'round';
        ctx.strokeStyle = lit ? '#d8ffd3' : '#bed8bf';
        for(let d=0; d<4; d++){
          if(!t.links[d]) continue;
          ctx.beginPath();
          ctx.moveTo(0,0);
          ctx.lineTo(DIRS[d].x * cell*0.25, DIRS[d].y * cell*0.25);
          ctx.stroke();
        }
        ctx.restore();

        ctx.fillStyle = lit ? 'rgba(248,255,242,0.98)' : 'rgba(240,249,240,0.88)';
        ctx.beginPath();
        ctx.arc(0,0,cell*0.11,0,Math.PI*2);
        ctx.fill();

        if(t.num){
          ctx.save();
          ctx.translate(cell*0.19, -cell*0.19);
          ctx.fillStyle = t.numLit ? '#f4ffd5' : '#ffefaf';
          ctx.font = `800 ${Math.floor(cell*0.22)}px system-ui`;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.shadowColor = t.numLit ? 'rgba(255,255,185,0.55)' : 'rgba(0,0,0,0)';
          ctx.shadowBlur = 10;
          ctx.fillText(String(t.num), 0, 0);
          ctx.restore();
        }

        if(t.pulse > 0.01){
          ctx.strokeStyle = `rgba(171,255,206,${t.pulse*0.45})`;
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.arc(0,0,cell*0.32 + t.pulse*4,0,Math.PI*2);
          ctx.stroke();
          t.pulse *= 0.9;
        }
        ctx.restore();
      }
    }

    ctx.save();
    ctx.globalAlpha = 0.25;
    ctx.strokeStyle = '#7be1a3';
    ctx.lineWidth = 1;
    for(let i=0;i<=N;i++){
      const x = boardX + i*cell;
      const y = boardY + i*cell;
      ctx.beginPath(); ctx.moveTo(x,boardY); ctx.lineTo(x,boardY+boardSize); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(boardX,y); ctx.lineTo(boardX+boardSize,y); ctx.stroke();
    }
    ctx.restore();
  }

  function drawPathPreview(){
    if(!pointer.down || !pointer.tile) return;
    const t = pointer.tile;
    const p = tilePos(t);
    ctx.save();
    ctx.strokeStyle = 'rgba(210,255,220,0.75)';
    ctx.lineWidth = 4;
    ctx.setLineDash([8,8]);
    ctx.beginPath();
    ctx.arc(p.x,p.y, cell*0.33, 0, Math.PI*2);
    ctx.stroke();
    ctx.restore();
  }

  function tick(time){
    anim = time * 0.001;
    drawBackground();
    drawBoard();
    drawPathPreview();
    requestAnimationFrame(tick);
  }

  function down(e){
    const p = getPos(e);
    pointer.down = true;
    pointer.startX = p.x;
    pointer.startY = p.y;
    pointer.moved = false;
    pointer.tile = tileAt(p.x,p.y);
    if(pointer.tile) rotateTile(pointer.tile, 1);
    pointer.x = p.x; pointer.y = p.y;
  }

  function move(e){
    if(!pointer.down) return;
    const p = getPos(e);
    pointer.x = p.x; pointer.y = p.y;
    if(Math.hypot(p.x-pointer.startX, p.y-pointer.startY) > 12) pointer.moved = true;
  }

  function up(e){
    if(!pointer.down) return;
    const p = getPos(e);
    const dist = Math.hypot(p.x-pointer.startX, p.y-pointer.startY);
    if(pointer.tile && pointer.moved && dist > 16){
      const other = tileAt(p.x,p.y);
      if(other && other !== pointer.tile){
        const dx = other.x - pointer.tile.x;
        const dy = other.y - pointer.tile.y;
        if(Math.abs(dx)+Math.abs(dy) === 1){
          const d = DIRS.findIndex(v=>v.x===dx && v.y===dy);
          const a = pointer.tile, b = other;
          a.rot = (a.rot + 1) % 4;
          b.rot = (b.rot + 3) % 4;
          a.pulse = b.pulse = 1;
        }
      }
    }
    pointer.down = false;
    pointer.tile = null;
    finalizeTurn();
  }

  function getPos(e){
    const r = canvas.getBoundingClientRect();
    const x = (e.touches ? e.touches[0].clientX : e.clientX) - r.left;
    const y = (e.touches ? e.touches[0].clientY : e.clientY) - r.top;
    return {x,y};
  }

  window.addEventListener('resize', resize);
  canvas.addEventListener('pointerdown', down);
  canvas.addEventListener('pointermove', move);
  window.addEventListener('pointerup', up);
  canvas.addEventListener('touchstart', e => { e.preventDefault(); down(e); }, {passive:false});
  canvas.addEventListener('touchmove', e => { e.preventDefault(); move(e); }, {passive:false});
  window.addEventListener('touchend', e => { e.preventDefault(); up(e); }, {passive:false});

  window.addEventListener('keydown', e => {
    if(e.key === 'r' || e.key === 'R') genBoard();
    if(e.key === ' '){
      e.preventDefault();
      finalizeTurn();
    }
  });
  restartBtn.addEventListener('click', genBoard);

  resize();
  genBoard();
  requestAnimationFrame(tick);
})();
</script>
</body>
</html>
